name: "Node.js build + test + lint + publish + deploy"

permissions:
  contents: write
  id-token: write

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use.'
        type: string
        required: false
        default: '24'
      working-directory:
        description: 'Relative path to the package directory (where package.json lives).'
        type: string
        required: false
        default: '.'
      registry-url:
        description: 'npm registry URL (used for setup-node).'
        type: string
        required: false
        default: 'https://registry.npmjs.org'
      lint-command:
        description: 'Lint command to run (can be empty to skip lint).'
        type: string
        required: false
        default: 'npm run lint'
      test-command:
        description: 'Test command to run (can be empty to skip tests).'
        type: string
        required: false
        default: 'npm test'
      build-command:
        description: 'Build command to run (can be empty to skip build).'
        type: string
        required: false
        default: 'npm run build'
      publish-enabled:
        description: 'Whether to publish to npm.'
        type: boolean
        required: false
        default: false
      publish-version:
        description: 'When publish-enabled: semver bump (patch/minor/major), then commit+tag+push after successful npm publish. Ignored if publish-enabled is false.'
        type: string
        required: false
        default: 'none'
      publish-auth-method:
        description: 'How to authenticate to npm when publishing (token or oidc).'
        type: string
        required: false
        default: 'token'
      publish-command:
        description: 'Publish command to run (empty: npm publish --tag "latest" --provenance).'
        type: string
        required: false
        default: ''
      deploy-folder:
        description: 'Folder path to deploy to gh-pages (relative to repo root).'
        type: string
        required: false
        default: ''
    secrets:
      NPM_TOKEN:
        description: 'npm authentication token (required when publish=true and auth-method=token).'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}

      - name: Install dependencies
        run: |
          cd "${{ inputs.working-directory }}"
          npm ci

      - name: Run tests
        if: ${{ inputs.test-command != '' }}
        run: |
          cd "${{ inputs.working-directory }}"
          ${{ inputs.test-command }}

      - name: Run lint (optional)
        if: ${{ inputs.lint-command != '' }}
        run: |
          cd "${{ inputs.working-directory }}"
          ${{ inputs.lint-command }}

      - name: Apply package version bump (no git commit yet)
        if: ${{ inputs.publish-enabled && inputs.publish-version != 'none' && inputs.publish-version != '' }}
        env:
          BUMP: ${{ inputs.publish-version }}
          WD: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          (cd "${WD}" && npm version "${BUMP}" --no-git-tag-version)

      - name: Build (optional)
        if: ${{ inputs.build-command != '' }}
        run: |
          cd "${{ inputs.working-directory }}"
          ${{ inputs.build-command }}

      - name: Configure npm for token auth (if enabled)
        if: ${{ inputs.publish-auth-method == 'token' && inputs.publish-enabled }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          REG: ${{ inputs.registry-url }}
        run: |
          cd "${{ inputs.working-directory }}"
          
          if [[ -z "${NPM_TOKEN}" ]]; then
            echo "NPM_TOKEN is required to publish with auth-method=token." >&2
            exit 1
          fi
          
          HOST="$(node -p "new URL(process.env.REG).host")"
          echo "//${HOST}/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "registry=${REG}" >> ~/.npmrc
          
          echo "✓ Configured npm for token authentication"

      - name: Publish to npm (optional)
        if: ${{ inputs.publish-enabled }}
        working-directory: ${{ inputs.working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ inputs.publish-auth-method == 'token' && secrets.NPM_TOKEN || '' }}
        run: |
          ${{ inputs.publish-command != '' && inputs.publish-command || 'npm publish --tag "latest" --provenance' }}

      - name: Commit and tag release version
        if: ${{ inputs.publish-enabled && inputs.publish-version != 'none' && inputs.publish-version != '' }}
        env:
          WD: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VER="$(cd "${WD}" && node -p "require('./package.json').version")"
          git add "${WD}/package.json"
          if [[ -f "${WD}/package-lock.json" ]]; then git add "${WD}/package-lock.json"; fi
          if git diff --cached --quiet; then
            echo "No staged version changes; skipping commit."
            exit 0
          fi
          git commit -m "chore(release): v${VER}"
          git tag "v${VER}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "refs/tags/v${VER}"

      - name: Deploy to GitHub Pages
        if: ${{ inputs.deploy-folder != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ inputs.deploy-folder }}
          publish_branch: 'gh-pages'
          commit_message: ${{ github.event.head_commit.message || format('Deploy {0}', github.sha) }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
