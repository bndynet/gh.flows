name: "Node.js build + test + lint + publish + deploy"

permissions:
  contents: write
  id-token: write

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use.'
        type: string
        required: false
        default: '20'
      working-directory:
        description: 'Relative path to the package directory (where package.json lives).'
        type: string
        required: false
        default: '.'
      registry-url:
        description: 'npm registry URL (used for setup-node).'
        type: string
        required: false
        default: 'https://registry.npmjs.org'
      lint-command:
        description: 'Lint command to run (can be empty to skip lint).'
        type: string
        required: false
        default: 'npm run lint'
      test-command:
        description: 'Test command to run (can be empty to skip tests).'
        type: string
        required: false
        default: 'npm test'
      build-command:
        description: 'Build command to run (can be empty to skip build).'
        type: string
        required: false
        default: 'npm run build'
      publish-enabled:
        description: 'Whether to publish to npm.'
        type: boolean
        required: false
        default: false
      publish-auth-method:
        description: 'How to authenticate to npm when publishing (token or oidc).'
        type: string
        required: false
        default: 'token'
      publish-tag:
        description: 'npm dist-tag for publish (e.g. latest, next).'
        type: string
        required: false
        default: 'latest'
      publish-provenance:
        description: 'Generate provenance attestation (requires npm >= 9.5.0).'
        type: boolean
        required: false
        default: true
      deploy-folder:
        description: 'Folder path to deploy to gh-pages (relative to repo root).'
        type: string
        required: false
        default: ''
    secrets:
      NPM_TOKEN:
        description: 'npm authentication token (required when publish=true and auth-method=token).'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}

      - name: Install dependencies
        run: |
          cd "${{ inputs.working-directory }}"
          npm ci

      - name: Run tests
        if: ${{ inputs.test-command != '' }}
        run: |
          cd "${{ inputs.working-directory }}"
          ${{ inputs.test-command }}

      - name: Run lint (optional)
        if: ${{ inputs.lint-command != '' }}
        run: |
          cd "${{ inputs.working-directory }}"
          ${{ inputs.lint-command }}

      - name: Build (optional)
        if: ${{ inputs.build-command != '' }}
        run: |
          cd "${{ inputs.working-directory }}"
          ${{ inputs.build-command }}

      - name: Configure npm for token auth (if enabled)
        if: ${{ inputs.publish-auth-method == 'token' && inputs.publish-enabled }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd "${{ inputs.working-directory }}"
          
          if [[ -z "${NPM_TOKEN}" ]]; then
            echo "NPM_TOKEN is required to publish with auth-method=token." >&2
            exit 1
          fi
          
          # Ensure npm is authenticated for the registry
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          
          echo "✓ Configured npm for token authentication"

      - name: Publish to npm (optional)
        if: ${{ inputs.publish-enabled }}
        working-directory: ${{ inputs.working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ inputs.publish-auth-method == 'token' && secrets.NPM_TOKEN || '' }}
        run: |
          npm publish --tag "${{ inputs.publish-tag }}"${{ inputs.publish-provenance && ' --provenance' || '' }}

      - name: Deploy to GitHub Pages
        if: ${{ inputs.deploy-folder != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ inputs.deploy-folder }}
          publish_branch: 'gh-pages'
          commit_message: ${{ github.event.head_commit.message }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
