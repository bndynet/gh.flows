name: Update npm dependencies in multiple repos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: bndynet/ichat
            default_branch: main
            node_version: 24
            packages: "@bndynet/vue-site"
          - repo: bndynet/icharts
            default_branch: main
            node_version: 24
            packages: "@bndynet/vue-site"

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.default_branch }}
          token: ${{ secrets.update-npm-deps-bot }}
          path: repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: repo/package-lock.json

      - name: Install dependencies
        working-directory: repo
        run: npm ci

      - name: Update selected packages
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail
          for pkg in ${{ matrix.packages }}; do
            echo "Updating $pkg"
            npm install "${pkg}@latest"
          done

      - name: Run tests
        working-directory: repo
        run: |
          npm run build --if-present

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.update-npm-deps-bot }}
          path: repo
          commit-message: "chore(deps): update selected npm dependencies"
          title: "chore(deps): update selected npm dependencies"
          body: |
            This PR was created automatically by GitHub Actions.

            Updated packages:
            ${{ matrix.packages }}
          branch: "chore/deps-update-${{ matrix.repo }}"
          base: ${{ matrix.default_branch }}
          delete-branch: true
