name: Update npm dependencies in multiple repos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: bndynet/ichat
            default_branch: main
            node_version: 24
            packages: "@bndynet/vue-site"

          - repo: bndynet/icharts
            default_branch: main
            node_version: 24
            project_path: site
            packages: "@bndynet/vue-site"

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.UPDATE_NPM_DEPS_BOT }}
          path: repo

      - name: Resolve project path
        shell: bash
        run: |
          if [ -n "${{ matrix.project_path }}" ]; then
            echo "PROJECT_DIR=repo/${{ matrix.project_path }}" >> "$GITHUB_ENV"
            echo "LOCKFILE=repo/${{ matrix.project_path }}/package-lock.json" >> "$GITHUB_ENV"
          else
            echo "PROJECT_DIR=repo" >> "$GITHUB_ENV"
            echo "LOCKFILE=repo/package-lock.json" >> "$GITHUB_ENV"
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: ${{ env.LOCKFILE }}
          
      - name: Install dependencies and build for root
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm ci

      - name: Update selected packages
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          for pkg in ${{ matrix.packages }}; do
            echo "Updating $pkg"
            npm install "${pkg}@latest"
          done

      - name: Run build
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          npm run build --if-present

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.UPDATE_NPM_DEPS_BOT }}
          path: repo
          commit-message: "chore(deps): update selected npm dependencies"
          title: "chore(deps): update selected npm dependencies"
          body: |
            This PR was created automatically by GitHub Actions.

            Repo: ${{ matrix.repo }}
            Project path: ${{ matrix.project_path || 'root' }}
            Updated packages:
            ${{ matrix.packages }}
          branch: "chore/deps-update-${{ strategy.job-index }}"
          base: ${{ matrix.default_branch }}
          delete-branch: true
